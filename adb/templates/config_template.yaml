# ============================================================
# Abaqus Data Bridge (ADB) — 配置文件模板
# 复制此文件并根据需要修改
# ============================================================

# --- Job 基本信息 ---
job:
  name: "my_analysis"           # 作业名称 (可选，自动从文件名提取)
  inp_file: "model.inp"         # INP 输入文件路径
  dat_file: "results.dat"       # DAT 结果文件路径
  output_dir: "./output"        # 输出目录

# --- 提取设置 ---
extraction:

  # 要提取的变量类型 (留空 [] = 提取全部)
  variables:
    # 节点变量: U(位移), RF(支反力), V(速度), A(加速度)
    nodal: ["U", "RF"]
    # 单元变量: S(应力), E(应变)
    element: ["S"]
    # 接触变量: CNORMF(法向力), CSHEARF(切向力), CPRESS(接触压力), COPEN(张开距离), CSLIP(滑移)
    contact: ["CNORMF", "CPRESS", "COPEN"]
    # 弹簧变量: S11(弹簧力), E11(相对位移)
    spring: ["S11", "E11"]
    # 截面变量: SF(截面力), SM(截面弯矩)
    section: ["SF"]

  # 筛选条件 (留空 = 不筛选，提取全部)
  filters:
    # 按节点集名称筛选
    node_sets: []
    # 按单元集名称筛选
    element_sets: []
    # 按 Step 名称筛选 (如 ["Step-1", "Step-2"])
    steps: []
    # 按 Increment 筛选: "last"(最后一帧) | "all"(全部) | [1, 3, 5](指定编号)
    increments: "last"
    # 按空间包围盒筛选 [xmin, ymin, zmin, xmax, ymax, zmax]
    bbox: null
    # 按正则表达式匹配 Set 名称
    set_pattern: null
    # 按单元类型筛选 (如 ["C3D8R", "SPRINGA"])
    element_types: []

  # 输出设置
  output:
    # 输出格式: csv | tsv
    format: "csv"
    # 文件编码: utf-8 | utf-8-sig (Excel推荐) | gbk
    encoding: "utf-8-sig"
    # 分隔符 (csv 默认逗号, tsv 默认制表符)
    delimiter: ","
    # 是否在 CSV 文件头部写入元数据行 (以 # 开头)
    include_metadata: true
    # 是否将所有 Set 合并到一个文件
    merge_sets: false
    # 数值小数位数
    decimal_places: 6
    # 是否在结果 CSV 中附带节点坐标列
    include_node_coords: true

  # 高级选项
  advanced:
    # 坐标系: global
    coordinate_system: "global"
    # 内存限制 (MB)，超出则启用流式处理
    memory_limit_mb: 2048
    # 是否检测未完成的分析
    detect_incomplete: true
    # 日志级别: DEBUG | INFO | WARNING | ERROR
    log_level: "INFO"
